<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hockey Sale Tracker — Detroit/Windsor</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222535;
      --border: #2e3248;
      --text: #e8eaf0;
      --muted: #7b8099;
      --active: #2dd4a0;
      --active-bg: #0a2419;
      --upcoming: #f59e0b;
      --upcoming-bg: #271d08;
      --past: #6b7280;
      --past-bg: #18191f;
      --waiting: #60a5fa;
      --waiting-bg: #0b1929;
      --warn-color: #f87171;
      --warn-bg: #2a1010;
      --confirm-color: #4ade80;
      --candidate-color: #fbbf24;
      --candidate-bg: #2a2108;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      padding: 20px 24px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .header-title { flex: 1; min-width: 180px; }
    .header-title h1 { font-size: 18px; font-weight: 700; }
    .header-title p { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .header-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .header-meta span { white-space: nowrap; }
    .header-meta .monitored { color: var(--active); font-weight: 500; }
    .refresh-btn {
      margin-top: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 11px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: color .15s, border-color .15s;
    }
    .refresh-btn:hover { color: var(--active); border-color: var(--active); }

    /* ── Main ── */
    main { padding: 18px 24px 40px; max-width: 1120px; margin: 0 auto; }

    .section-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin: 28px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .section-header:first-child { margin-top: 4px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 12px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px 16px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      transition: border-color .15s;
    }
    .card.has-news      { border-color: var(--active); }
    .card.has-warn      { border-color: var(--warn-color); }
    .card.has-confirm   { border-color: var(--confirm-color); }
    .card.has-candidate { border-color: var(--candidate-color); }
    .card.past          { opacity: .55; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-name { font-weight: 600; font-size: 15px; }
    .card-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-active   { background: var(--active-bg);   color: var(--active); }
    .badge-upcoming { background: var(--upcoming-bg); color: var(--upcoming); }
    .badge-past     { background: var(--past-bg);     color: var(--past); }
    .badge-waiting  { background: var(--waiting-bg);  color: var(--waiting); }

    .detail-row { font-size: 12px; color: var(--muted); }
    .detail-row strong { color: var(--text); font-weight: 500; }

    /* ── Last confirmed sale row ── */
    .last-sale-row {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border-radius: 6px;
      padding: 6px 10px;
    }
    .last-sale-row strong { color: var(--confirm-color); font-weight: 600; }
    .last-sale-row.unverified { color: var(--muted); font-style: italic; }

    /* ── News box ── */
    .news-box {
      background: var(--surface2);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      border-left: 3px solid var(--active);
    }
    .news-box.warn      { border-left-color: var(--warn-color); }
    .news-box.confirm   { border-left-color: var(--confirm-color); }
    .news-box.candidate { border-left-color: var(--candidate-color); }

    .news-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--active);
      margin-bottom: 5px;
    }
    .news-box.warn      .news-label { color: var(--warn-color); }
    .news-box.confirm   .news-label { color: var(--confirm-color); }
    .news-box.candidate .news-label { color: var(--candidate-color); }

    .news-text { line-height: 1.45; }
    .news-text a { color: #93c5fd; }

    .news-detected { font-size: 11px; color: var(--muted); margin-top: 6px; }

    .news-sources { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .news-sources a {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 7px;
      text-decoration: none;
      transition: color .12s, border-color .12s;
    }
    .news-sources a:hover { color: var(--text); border-color: var(--muted); }

    /* ── Watch links ── */
    .watch-links { display: flex; flex-wrap: wrap; gap: 5px; }
    .watch-links a {
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      text-decoration: none;
      transition: color .12s, border-color .12s;
    }
    .watch-links a:hover { color: var(--text); border-color: var(--muted); }

    /* ── States ── */
    #loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
    .error   { color: var(--warn-color); padding: 20px; }

    @media (max-width: 540px) {
      header { padding: 14px 14px 10px; }
      main   { padding: 12px 14px 30px; }
      .grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>🏒 Detroit / Windsor Hockey Sale Tracker</h1>
    <p>Monitors equipment sales across pro, junior, and college teams in the region</p>
  </div>
  <div class="header-meta">
    <span class="monitored" id="last-monitored">Last monitored: —</span>
    <span id="last-updated">Last data change: —</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main id="app">
  <div id="loading">Loading team data…</div>
</main>

<script>
const RAW = 'https://raw.githubusercontent.com/NicMuffins/hockey-sale-tracker/main/';
const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function computeStatus(pw) {
  if (!pw) return 'active';
  try {
    const now = new Date(); now.setHours(0,0,0,0);
    const y = now.getFullYear();
    const [sm, sd] = pw.start.split('-').map(Number);
    const [em, ed] = pw.end.split('-').map(Number);
    let start = new Date(y, sm-1, sd);
    let end   = new Date(y, em-1, ed);
    if (end < start) end = new Date(y+1, em-1, ed);
    if (now > end)   return 'past';
    if (now >= start) return 'active';
    return ((start - now) / 86400000) <= 30 ? 'upcoming' : 'waiting';
  } catch(e) { return 'active'; }
}

function formatWindow(pw, override) {
  if (override) return override;
  if (!pw) return null;
  try {
    const [sm, sd] = pw.start.split('-').map(Number);
    const [em, ed] = pw.end.split('-').map(Number);
    const conf = pw.confidence && pw.confidence !== 'high' ? ` <span style="color:var(--muted)">(${pw.confidence} confidence)</span>` : '';
    return `${MONTHS[sm]}&nbsp;${sd} – ${MONTHS[em]}&nbsp;${ed}${conf}`;
  } catch(e) { return null; }
}

function badge(status) {
  const map = {
    active:   ['Active',   'badge-active'],
    upcoming: ['Upcoming', 'badge-upcoming'],
    past:     ['Past',     'badge-past'],
    waiting:  ['Waiting',  'badge-waiting'],
  };
  const [label, cls] = map[status] || ['—', 'badge-past'];
  return `<span class="badge ${cls}">${label}</span>`;
}

// Renders the persistent "last confirmed sale" line. This only ever reflects
// dates Nic has personally verified — never an auto-detected find.
function renderLastSale(lcs) {
  if (!lcs) {
    return `<div class="last-sale-row unverified">Last confirmed sale: not yet verified</div>`;
  }
  const yearStr = lcs.year ? `, ${esc(lcs.year)}` : '';
  return `<div class="last-sale-row">Last confirmed sale: <strong>${esc(lcs.date)}${yearStr}</strong></div>`;
}

function renderNews(ln) {
  if (!ln) return '';
  const isWarn      = !!ln.news_warn;
  const isVerified  = !!ln.verified && !isWarn;
  const isCandidate = !!ln.is_announcement && !isWarn && !isVerified;
  const boxCls = isVerified ? 'confirm' : isWarn ? 'warn' : isCandidate ? 'candidate' : '';
  const label = ln.news_label
    || (isVerified ? '✅ Verified Sale'
      : isWarn ? '⚠ Watch Closely'
      : isCandidate ? '🔍 Possible Sale — Needs Your OK'
      : 'Latest News');
  const bodyHtml  = ln.news_html
    ? `<div class="news-text">${ln.news_html}</div>`
    : `<div class="news-text">${ln.summary || ''}</div>`;
  const detected  = ln.detected_display || ln.detected_at || '';
  const detHtml   = detected ? `<div class="news-detected">Detected: ${detected}</div>` : '';
  const srcs = [];
  if (ln.source && ln.url) srcs.push(`<a href="${escHref(ln.url)}" target="_blank" rel="noopener">${esc(ln.source)}</a>`);
  (ln.extra_sources || []).forEach(s => srcs.push(`<a href="${escHref(s.url)}" target="_blank" rel="noopener">${esc(s.label)}</a>`));
  const srcHtml = srcs.length ? `<div class="news-sources">${srcs.join('')}</div>` : '';
  return `<div class="news-box ${boxCls}"><div class="news-label">${label}</div>${bodyHtml}${detHtml}${srcHtml}</div>`;
}

function renderCard(team) {
  const status    = computeStatus(team.predicted_window);
  const windowStr = formatWindow(team.predicted_window, team.window_display);
  const newsHtml  = renderNews(team.latest_news);
  const lastSaleHtml = renderLastSale(team.last_confirmed_sale);
  const ln = team.latest_news;
  const hasWarn      = ln?.news_warn;
  const hasConfirm   = !!ln?.verified && !hasWarn;
  const hasCandidate = !!ln?.is_announcement && !hasWarn && !hasConfirm;
  const hasNews      = !!ln;
  const cardCls = ['card',
    status === 'past' ? 'past' : '',
    hasWarn      ? 'has-warn'      : '',
    hasConfirm   ? 'has-confirm'   : '',
    hasCandidate ? 'has-candidate' : '',
    hasNews && !hasWarn && !hasConfirm && !hasCandidate ? 'has-news' : '',
  ].filter(Boolean).join(' ');
  const venueHtml  = team.venue  ? `<div class="detail-row">${esc(team.venue)}</div>` : '';
  const windowHtml = windowStr   ? `<div class="detail-row">Window: <strong>${windowStr}</strong></div>` : '';
  const links = (team.watch_links || []).map(l =>
    `<a href="${escHref(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`).join('');
  const watchHtml = links ? `<div class="watch-links">${links}</div>` : '';
  return `
<div class="${cardCls}">
  <div class="card-top">
    <div>
      <div class="card-name">${esc(team.name)}</div>
      <div class="card-meta">${esc(team.league)}</div>
    </div>
    ${badge(status)}
  </div>
  ${venueHtml}
  ${windowHtml}
  ${lastSaleHtml}
  ${newsHtml}
  ${watchHtml}
</div>`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escHref(u) {
  try { return new URL(u).href; } catch(e) { return '#'; }
}

async function loadData() {
  document.getElementById('app').innerHTML = '<div id="loading">Refreshing…</div>';
  try {
    const bust = '?t=' + Date.now();
    const [tdRes, msRes] = await Promise.all([
      fetch(RAW + 'teams_data.json' + bust),
      fetch(RAW + 'monitor_state.json' + bust),
    ]);
    if (!tdRes.ok) throw new Error(`teams_data.json: HTTP ${tdRes.status}`);
    if (!msRes.ok) throw new Error(`monitor_state.json: HTTP ${msRes.status}`);
    const td = await tdRes.json();
    const ms = await msRes.json();

    document.getElementById('last-monitored').textContent = `Last monitored: ${ms.last_monitored || '—'}`;
    document.getElementById('last-updated').textContent   = `Last data change: ${td.last_updated || '—'}`;

    const groups = { active: [], upcoming: [], waiting: [], past: [] };
    for (const team of (td.teams || [])) {
      const s = computeStatus(team.predicted_window);
      groups[s].push(team);
    }

    const ORDER  = ['active', 'upcoming', 'waiting', 'past'];
    const LABELS = {
      active:   '🟢 Active Window',
      upcoming: '🟡 Window Opening Soon (≤ 30 days)',
      waiting:  '🔵 Future Window',
      past:     '⚪ Window Passed',
    };

    let html = '';
    for (const status of ORDER) {
      const teams = groups[status];
      if (!teams.length) continue;
      // Sort: verified sales first, then candidates needing review, then warns, then others with news, then alphabetical
      teams.sort((a, b) => {
        const score = t => {
          const ln = t.latest_news;
          if (!ln) return 0;
          if (ln.verified && !ln.news_warn) return 4;
          if (ln.news_warn) return 3;
          if (ln.is_announcement) return 2;
          return 1;
        };
        return score(b) - score(a) || a.name.localeCompare(b.name);
      });
      html += `<div class="section-header">${LABELS[status]} &nbsp;·&nbsp; ${teams.length} team${teams.length > 1 ? 's' : ''}</div>`;
      html += `<div class="grid">${teams.map(renderCard).join('')}</div>`;
    }
    document.getElementById('app').innerHTML = html;
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="error">⚠ Failed to load: ${esc(e.message)}</div>`;
  }
}

loadData();
</script>
</body>
</html>
